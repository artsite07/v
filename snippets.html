<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Adlan Madjied Ridho</title>
<link rel="icon" href="1.png">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
  body {
    margin:0;
    background:#000;
    color:#00fff7;
    font-family:"Courier New", monospace;
    display:flex;
    flex-direction:column;
    height:100vh;
    padding:10px;
  }
  h1 {
    margin:20px 0 10px;
    font-size:18px;
    text-shadow:0 0 6px rgba(0,255,247,0.4);
  }
  textarea {
    flex:1;
    width:100%;
    background:#050505;
    color:#7fffd4;
    border:1px solid rgba(0,255,247,0.2);
    border-radius:6px;
    padding:10px;
    font-family:inherit;
    font-size:14px;
    resize:none;
    outline:none;
  }
  /* Notifikasi kecil */
  #savedMsg {
    position:fixed;
    bottom:12px;
    right:16px;
    background:rgba(0,255,247,0.1);
    border:1px solid rgba(0,255,247,0.3);
    color:#00fff7;
    padding:6px 10px;
    border-radius:6px;
    font-size:13px;
    opacity:0;
    transition:opacity 0.3s ease;
    pointer-events:none;
    text-shadow:0 0 6px rgba(0,255,247,0.4);
  }
  #savedMsg.show {
    opacity:1;
  }
</style>
</head>
<body>
  <h1>Snippet Storage</h1>
  <textarea id="snippet"></textarea>
  <div id="savedMsg">✓ Saved</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyCba6M_spBXvuG91Zn-XWJ4bSTX6vNcST0",
    authDomain: "index-68220.firebaseapp.com",
    databaseURL: "https://index-68220-default-rtdb.firebaseio.com",
    projectId: "index-68220",
    storageBucket: "index-68220.firebasestorage.app",
    messagingSenderId: "633087068802",
    appId: "1:633087068802:web:f8aa1f2ef9c00b99d1429b",
    measurementId: "G-2VQCRFJQCM"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const textarea = document.getElementById('snippet');
  const savedMsg = document.getElementById('savedMsg');
  let saveTimer;

  // Sync realtime dari Firebase ke textarea
  db.ref('snippets').on('value', snap => {
    textarea.value = snap.val() || "";
  });

  // Auto-save saat mengetik
  textarea.addEventListener('input', () => {
    db.ref('snippets').set(textarea.value, (err) => {
      if (!err) {
        savedMsg.classList.add('show');
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => savedMsg.classList.remove('show'), 1200);
      }
    });
  });

  // 🔒 Proteksi akses dengan token
  (function(){
    try {
      const raw = sessionStorage.getItem('dashboard_access');
      if (!raw) throw new Error("No access token");
      const data = JSON.parse(raw);
      if (!data.token) throw new Error("Invalid token");
      console.log("Access granted:", data.token);
    } catch (err) {
      console.warn("Access denied:", err.message);
      window.location.replace("index.html");
    }
  })();
</script>
</body>
</html>
