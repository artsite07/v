<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Adlan Madjied Ridho</title>
  <link rel="icon" type="image/png" href="1.png">
  <style>
    :root {
      --bg: #000;
      --cyan: #00ffd9;
      --muted-cyan: #3de7d0;
      --glass: rgba(255, 255, 255, 0.03);
      --mono: 'Courier New', Courier, monospace;
    }

    html,
    body {
      height: 100%
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--cyan);
      font-family: var(--mono);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      padding: 28px 22px;
      border-radius: 12px;
      background: transparent;
      text-align: center;
      position: relative;
    }

    .welcome {
      font-size: 20px;
      height: 28px;
      margin: 0 0 12px;
      white-space: nowrap;
      overflow: hidden;
      letter-spacing: 1px;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 8px
    }

    p {
      margin: 6px 0 12px;
      font-size: 13px;
      opacity: 0.9
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center
    }

    input {
      background: transparent;
      border: 1px solid rgba(0, 255, 217, 0.08);
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--cyan);
      outline: none;
      width: 260px;
      font-family: var(--mono);
      font-size: 15px;
    }

    button {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid rgba(0, 255, 217, 0.18);
      background: linear-gradient(180deg, rgba(0, 255, 217, 0.04), rgba(0, 255, 217, 0.01));
      color: var(--cyan);
      cursor: pointer;
      font-family: var(--mono);
      transition: 0.2s;
    }

    button:hover {
      background: var(--cyan);
      color: #000
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: rgba(0, 255, 217, 0.6)
    }

    .ok {
      color: var(--muted-cyan);
      margin-top: 12px
    }

    @media (max-width:480px) {
      input {
        width: 170px
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <div class="welcome" id="welcome"></div>
    <h1>Set your password</h1>
    <p>Enter a new password — this page will store a SHA-256 hash to Firebase Realtime Database (demo only).</p>

    <div class="row">
      <input id="newPw" type="password" placeholder="New password" aria-label="New password" />
      <button id="saveBtn">Set Password</button>
    </div>

    <div class="ok" id="status" aria-live="polite"></div>
    <div class="note">Security note: real authentication must be done on a secure server. This page is for demo/config only.</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCba6M_spBXvuG91Zn-XWJ4bSTX6vNcST0",
      authDomain: "index-68220.firebaseapp.com",
      databaseURL: "https://index-68220-default-rtdb.firebaseio.com",
      projectId: "index-68220",
      storageBucket: "index-68220.firebasestorage.app",
      messagingSenderId: "633087068802",
      appId: "1:633087068802:web:f8aa1f2ef9c00b99d1429b",
      measurementId: "G-2VQCRFJQCM"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const newPw = document.getElementById('newPw');
    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('status');

    function toHex(buffer) {
      const bytes = new Uint8Array(buffer);
      return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
    }
    async function hashPassword(pw) {
      const enc = new TextEncoder().encode(pw);
      const digest = await crypto.subtle.digest('SHA-256', enc);
      return toHex(digest);
    }

    btn.addEventListener('click', async () => {
      const v = newPw.value || '';
      if (v.length < 4) {
        status.textContent = 'Password too short (min 4 chars)';
        return;
      }
      status.textContent = 'Hashing and saving...';
      try {
        const hash = await hashPassword(v);
        await db.ref('real/passwordHash').set(hash);
        status.textContent = 'Password set in database (SHA-256 hash).';
        newPw.value = '';
      } catch (err) {
        console.error(err);
        status.textContent = 'Failed to save password. Check console.';
      }
    });

    newPw.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') btn.click();
    });

    // Typing animation
    const welcomeEl = document.getElementById('welcome');
    const texts = ["Configure password.", "Choose a strong passphrase.", "Hash will be stored in RTDB."];
    let tIdx = 0;

    function typeLine(line, cb) {
      let i = 0;
      welcomeEl.textContent = '';
      const iv = setInterval(() => {
        welcomeEl.textContent += line[i++] || '';
        if (i > line.length) {
          clearInterval(iv);
          setTimeout(() => cb && cb(), 900);
        }
      }, 40);
    }

    function loopWelcome() {
      typeLine(texts[tIdx], () => {
        let k = texts[tIdx].length;
        const del = setInterval(() => {
          welcomeEl.textContent = welcomeEl.textContent.slice(0, -1);
          k--;
          if (k <= 0) {
            clearInterval(del);
            tIdx = (tIdx + 1) % texts.length;
            setTimeout(loopWelcome, 400);
          }
        }, 20);
      });
    }
    document.addEventListener('DOMContentLoaded', () => {
      loopWelcome();
      newPw.focus();
    });

    // Akses kontrol
    (function() {
      try {
        const raw = sessionStorage.getItem('dashboard_access');
        if (!raw) throw new Error("No access token");
        const data = JSON.parse(raw);
        if (!data.token) throw new Error("Invalid token");
        console.log("Access granted:", data.token);
      } catch (err) {
        console.warn("Access denied:", err.message);
        window.location.replace("index.html");
      }
    })();

  </script>
</body>

</html>
