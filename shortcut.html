<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Adlan Madjied Ridho</title>
  <link rel="icon" type="image/png" href="1.png">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <style>
    body {
      background-color: #000;
      color: cyan;
      font-family: monospace;
      text-align: center;
      padding: 20px;
    }
    h1 {
      text-shadow: 0 0 15px cyan;
    }
    .input-container {
      width: 80%;
      margin: 15px auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    input {
      padding: 10px;
      background: #000;
      border: 1px solid cyan;
      color: cyan;
      font-family: monospace;
      border-radius: 8px;
    }
    button {
      background: #000;
      border: 1px solid cyan;
      color: cyan;
      padding: 8px 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      background: cyan;
      color: #000;
    }
    .shortcut-card {
      border: 1px solid cyan;
      margin: 10px auto;
      padding: 15px;
      width: 80%;
      text-align: left;
      border-radius: 12px;
      box-shadow: 0 0 10px cyan;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .shortcut-info {
      display: flex;
      flex-direction: column;
    }
    .shortcut-info a {
      color: cyan;
      text-decoration: none;
      font-size: 16px;
    }
    .shortcut-info a:hover {
      text-decoration: underline;
    }
    .shortcut-url {
      font-size: 12px;
      color: #7fffd4;
      margin-top: 4px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>🔗 Shortcuts Saver</h1>

  <div class="input-container">
    <input id="nameInput" type="text" placeholder="Shortcut name...">
    <input id="linkInput" type="url" placeholder="Shortcut link (https://...)">
    <button onclick="saveShortcut()">Save</button>
  </div>

  <h2>📂 Shortcuts List</h2>
  <div id="shortcutsList"></div>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCba6M_spBXvuG91Zn-XWJ4bSTX6vNcST0",
      authDomain: "index-68220.firebaseapp.com",
      databaseURL: "https://index-68220-default-rtdb.firebaseio.com",
      projectId: "index-68220",
      storageBucket: "index-68220.firebasestorage.app",
      messagingSenderId: "633087068802",
      appId: "1:633087068802:web:f8aa1f2ef9c00b99d1429b",
      measurementId: "G-2VQCRFJQCM"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function saveShortcut() {
      const name = document.getElementById("nameInput").value.trim();
      const link = document.getElementById("linkInput").value.trim();

      if (name === "" || link === "") return;
      if (!link.startsWith("http://") && !link.startsWith("https://")) {
        alert("Link must start with http:// or https://");
        return;
      }

      const newRef = db.ref("shortcuts").push();
      newRef.set({ name: name, link: link });

      document.getElementById("nameInput").value = "";
      document.getElementById("linkInput").value = "";
    }

    function deleteShortcut(id) {
      db.ref("shortcuts/" + id).remove();
    }

    db.ref("shortcuts").on("value", snapshot => {
      const list = document.getElementById("shortcutsList");
      list.innerHTML = "";
      snapshot.forEach(child => {
        const data = child.val();
        const div = document.createElement("div");
        div.className = "shortcut-card";
        div.innerHTML = `
          <div class="shortcut-info">
            <a href="${data.link}" target="_blank">${data.name}</a>
            <div class="shortcut-url">${data.link}</div>
          </div>
          <button onclick="deleteShortcut('${child.key}')">Delete</button>
        `;
        list.prepend(div);
      });
    });

    // Enter key → Save
    document.getElementById("linkInput").addEventListener("keypress", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        saveShortcut();
      }
    });

    // Akses kontrol
    (function(){
      try {
        const raw = sessionStorage.getItem('dashboard_access');
        if (!raw) throw new Error("No access token");

        const data = JSON.parse(raw);
        if (!data.token) throw new Error("Invalid token");

        console.log("Access granted:", data.token);
      } catch (err) {
        console.warn("Access denied:", err.message);
        window.location.replace("index.html");
      }
    })();
  </script>
</body>
</html>
