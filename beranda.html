<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Adlan Madjied Ridho - Dashboard</title>
  <link rel="icon" href="1.png" />
  <!-- Menggunakan font Inter untuk tampilan modern -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- Firebase JS (compat) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>
    :root {
      --bg-dark: #0a0e14;
      /* Background utama (biru gelap) */
      --sidebar-bg: #111827;
      /* Background sidebar (lebih cerah dari bg) */
      --cyan-main: #00f0ff;
      /* Cyan neon utama */
      --cyan-accent: #00b0ff;
      /* Biru-cyan (kontras) */
      --text-color: #e0e6f0;
      --sidebar-w: 240px;
      /* Lebar sidebar tetap */
      --border-color: rgba(0, 240, 255, 0.1);
      --shadow-glow: 0 0 10px rgba(0, 240, 255, 0.15);
      --shadow-inset: 0 0 8px rgba(0, 240, 255, 0.05) inset;
      --muted-text: #9ca3af;
      /* Warna abu-abu untuk teks sekunder */
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg-dark);
      color: var(--text-color);
      overflow: hidden;
      /* Pastikan tidak ada scrollbar pada body */
    }

    /* Layout Utama: Grid 2 Kolom */
    .main-grid {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
      width: 100vw;
      padding: 15px; /* Tambahkan sedikit padding pada grid utama */
    }

    /* =====================
       Sidebar Kiri (Navigasi)
       ===================== */
    .sidebar {
      background: var(--sidebar-bg);
      /* Hapus border-right karena kita akan menggunakan padding/margin di grid */
      border-radius: 12px;
      /* Tambahkan ujung bulat pada sidebar */
      padding: 15px;
      overflow-y: scroll;
      /* Tetap izinkan scroll */
      box-shadow: 5px 0 20px rgba(0, 240, 255, 0.05), 0 0 15px rgba(0, 0, 0, 0.5); /* Bayangan lebih halus */
      display: flex;
      flex-direction: column;
    }

    /* CSS untuk Menyembunyikan Scrollbar secara Visual */
    .sidebar::-webkit-scrollbar {
      display: none;
      /* Untuk Chrome, Safari, dan Opera */
    }

    .sidebar {
      -ms-overflow-style: none;
      /* Untuk IE dan Edge */
      scrollbar-width: none;
      /* Untuk Firefox */
    }

    /* Styling Kartu Profil */
    .profile-card {
      padding: 0 0 20px;
      text-align: center;
      border-bottom: 1px solid rgba(0, 240, 255, 0.1);
      margin-bottom: 20px;
      margin-top: 10px;
      flex-shrink: 0; /* Agar kartu profil tidak mengecil */
    }

    .profile-card img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--cyan-main);
      /* Border neon cyan */
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
      /* Glow effect */
      margin-bottom: 10px;
      transition: transform 0.3s ease;
    }

    .profile-card img:hover {
      transform: scale(1.05);
    }

    .profile-card h3 {
      margin: 5px 0 2px;
      font-size: 1.1rem;
      color: var(--cyan-main);
      font-weight: 700;
      text-shadow: var(--shadow-glow);
    }

    .profile-card p {
      margin: 0;
      font-size: 0.75rem;
      color: var(--muted-text);
    }

    .sidebar h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--cyan-accent);
      margin: 15px 0 10px;
      text-transform: uppercase;
    }

    .nav-group {
      list-style: none;
      padding: 0;
      margin-bottom: 25px;
      flex-grow: 1; /* Mengisi ruang yang tersisa */
    }

    .nav-group li a {
      color: var(--text-color);
      text-decoration: none;
      display: flex;
      align-items: center;
      padding: 10px 12px;
      margin-bottom: 5px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
      font-size: 0.9rem;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .nav-group li a:hover {
      background: rgba(0, 240, 255, 0.1);
      color: var(--cyan-main);
      box-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
    }

    .nav-group li a.active {
      background: var(--cyan-accent);
      color: var(--sidebar-bg);
      font-weight: 600;
      box-shadow: 0 0 15px var(--cyan-accent);
    }

    /* Styling Tombol Logout */
    .logout-container {
        padding: 15px 0 0;
        border-top: 1px solid rgba(0, 240, 255, 0.1);
        flex-shrink: 0; /* Agar tombol logout tetap di bawah */
    }
    .logout-button {
        width: 100%;
        padding: 10px;
        background: none;
        border: 1px solid var(--cyan-main);
        color: var(--cyan-main);
        border-radius: 8px; /* Ujung tombol bulat */
        cursor: pointer;
        font-weight: 600;
        font-size: 1rem;
        transition: background 0.3s, color 0.3s, box-shadow 0.3s;
    }
    .logout-button:hover {
        background: var(--cyan-main);
        color: var(--sidebar-bg);
        box-shadow: 0 0 15px var(--cyan-main);
    }


    /* =====================
       Konten Kanan (Iframe)
       ===================== */
    .content-area {
      position: relative;
      padding: 0;
      /* Padding Dihapus untuk Full Iframe */
      overflow: hidden;
      margin-left: 15px; /* Berikan jarak antara sidebar dan iframe area */
      border-radius: 12px; /* Ujung bulat pada area iframe */
    }

    #mainIframe {
      width: 100%;
      height: 100%;
      border: none;
      /* Menghapus border */
      background: #000;
      border-radius: 12px; /* Pastikan iframe juga rounded */
    }
  </style>
</head>

<body>
  <div class="main-grid">

    <!-- Sidebar Kiri: Profil & Navigasi Murni -->
    <aside class="sidebar">

      <!-- Kartu Profil -->
      <div class="profile-card">
        <!-- Penggunaan 1.png untuk profil -->
        <img src="1.png" onerror="this.onerror=null;this.src='https://placehold.co/80x80/00f0ff/111827?text=AM';" alt="Foto Profil">
        <h3>Adlan Madjied Ridho</h3>
        <p>Administrator Portal</p>
      </div>

      <!-- Navigasi Utama -->
      <h2 id="navTitle">Navigasi Utama</h2>
      <ul class="nav-group" id="navList">
        <li style="opacity:.6; color: var(--muted-text);">Memuat Navigasi...</li>
      </ul>

      <!-- Tombol Logout (Baru Ditambahkan) -->
      <div class="logout-container">
          <button id="logoutButton" class="logout-button">
              Logout
          </button>
      </div>

    </aside>

    <!-- Konten Kanan: Iframe Full -->
    <section class="content-area">
      <iframe id="mainIframe" name="mainFrame" src="about:blank"></iframe>
    </section>

  </div>

  <script>
    /* Firebase config */
    const firebaseConfig = {
      apiKey: "AIzaSyCba6M_spBXvuG91Zn-XWJ4bSTX6vNcST0",
      authDomain: "index-68220.firebaseapp.com",
      databaseURL: "https://index-68220-default-rtdb.firebaseio.com",
      projectId: "index-68220",
      storageBucket: "index-68220.firebasestorage.app",
      messagingSenderId: "633087068802",
      appId: "1:633087068802:web:f8aa1f2ef9c00b99d1429b",
      measurementId: "G-2VQCRFJQCM"
    };
    // Menginisialisasi Firebase (pastikan kompatibilitas dengan SDK v8)
    if (typeof firebase !== 'undefined' && !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = typeof firebase !== 'undefined' ? firebase.database() : null;

    function escapeHTML(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
    }

    /* =====================
       Auth check and Logout
       ===================== */
    function handleLogout() {
        // Hapus status autentikasi dari sessionStorage
        sessionStorage.removeItem('auth');
        // Alihkan ke halaman login
        window.location.href = "index.html";
    }

    // Pasang event listener ke tombol logout
    document.getElementById('logoutButton').addEventListener('click', handleLogout);

    if (!sessionStorage.getItem('auth')) {
      // Jika tidak terautentikasi, alihkan kembali ke halaman login
      // window.location.href = "index.html"; // Dikomentari untuk testing
    }

    /* =====================
       Iframe Handler
       ===================== */
    const mainIframe = document.getElementById('mainIframe');
    const navList = document.getElementById('navList');
    // Key sessionStorage untuk menyimpan URL aktif
    const ACTIVE_URL_KEY = 'activeNavUrl'; 

    function setActiveLink(url) {
      // Pastikan URL yang disimpan hanya bagian yang relevan (tanpa query param)
      const cleanUrl = url ? url.split('?')[0] : ''; // Tambahkan cek null/undefined
      
      // 1. Hapus kelas 'active' dari semua tautan
      document.querySelectorAll('#navList a').forEach(a => {
        a.classList.remove('active');
      });

      // 2. Tambahkan kelas 'active' ke tautan yang sedang dimuat
      // Gunakan [href] selector yang lebih presisi
      const activeLink = document.querySelector(`a[href="${cleanUrl}"]`);
      if (activeLink) {
        activeLink.classList.add('active');
      }

      // 3. Simpan URL yang baru aktif ke sessionStorage
      if (cleanUrl) {
        sessionStorage.setItem(ACTIVE_URL_KEY, cleanUrl);
      }
    }

    /* =====================
       Navigasi (Memuat ke Iframe) - LOGIKA DIPERBAIKI
       ===================== */
    if (navList && db) {
      db.ref('navigation').on('value', snap => {
        // Ambil URL yang disimpan sebelum menghapus dan membuat ulang daftar
        const storedUrlBeforeRender = sessionStorage.getItem(ACTIVE_URL_KEY);
        
        // Hapus konten lama sebelum membuat yang baru
        navList.innerHTML = ''; 

        if (!snap.exists()) {
          navList.innerHTML = '<li style="opacity:.6; color: var(--muted-text);">Tidak ada navigasi</li>';
          return;
        }

        let firstLink = null;
        let links = [];
        const fragment = document.createDocumentFragment(); // Gunakan fragment untuk performa

        snap.forEach(child => {
          const d = child.val();
          if (!d.link || !d.name) return;
          
          const cleanLink = d.link.split('?')[0]; 
          links.push(cleanLink); 

          if (!firstLink) {
            firstLink = cleanLink; 
          }

          const li = document.createElement('li');
          const a = document.createElement('a');
          a.textContent = escapeHTML(d.name);
          a.href = cleanLink; 
          a.target = 'mainFrame'; 

          // LOGIKA PENTING: Saat mengklik, segera atur status aktif dan muat iframe
          a.addEventListener('click', (e) => {
            e.preventDefault();
            const url = a.href;
            mainIframe.src = url;
            setActiveLink(url); // Set aktif segera setelah klik
            // Tidak perlu ada logika tambahan di sini karena setActiveLink sudah menyimpan ke sessionStorage
          });

          li.appendChild(a);
          fragment.appendChild(li); // Tambahkan ke fragment
        });

        navList.appendChild(fragment); // Masukkan semua elemen sekaligus ke DOM

        // Logika Aktivasi saat Memuat Halaman
        // Gunakan URL yang baru saja disimpan saat klik, atau yang disimpan sebelumnya, atau yang pertama
        const storedUrl = sessionStorage.getItem(ACTIVE_URL_KEY);
        let urlToActivate = firstLink; // Default ke tautan pertama

        if (storedUrl && links.includes(storedUrl)) {
             // Jika ada URL yang disimpan dan valid, gunakan itu
            urlToActivate = storedUrl;
        } else if (storedUrlBeforeRender && links.includes(storedUrlBeforeRender)) {
            // Ini berfungsi sebagai lapisan keamanan jika storedUrl terhapus karena alasan tertentu
            urlToActivate = storedUrlBeforeRender;
        }
        
        // PASTIKAN STATUS AKTIF DITERAPKAN SETELAH SEMUA TAUTAN ADA DI DOM
        if (urlToActivate) {
            setActiveLink(urlToActivate);
        }

        // Muat iframe: muat ulang iframe hanya jika URL saat ini tidak cocok dengan yang seharusnya aktif
        // Ini mencegah iframe dimuat ulang secara tidak perlu saat navigasi diperbarui
        const currentIframeSrc = mainIframe.src.split('?')[0];

        if (currentIframeSrc !== urlToActivate) {
            mainIframe.src = urlToActivate;
        }
      });
    }

    /* =====================
       Hapus Logika Pintasan dan Rencana Aksi (Sesuai Permintaan Sebelumnya)
       ===================== */
    
    // Fallback DOMContentLoaded 
    document.addEventListener('DOMContentLoaded', () => {
      // Pastikan ada jeda waktu singkat jika Firebase gagal atau sangat lambat
      setTimeout(() => {
        if (mainIframe.src === "about:blank" || mainIframe.src === window.location.href) {
            // Fallback jika iframe masih kosong
            const urlToActivate = sessionStorage.getItem(ACTIVE_URL_KEY) || "https://www.google.com/search?q=selamat+datang+di+portal+admin";
            mainIframe.src = urlToActivate;
            setActiveLink(urlToActivate); // Coba set aktif lagi
        }
      }, 50); // Jeda singkat 50ms untuk memberi waktu Firebase me-render
    });

  </script>

</body>

</html>
